name: ci

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-msvc:
    name: windows-msvc (VS2022)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-windows
      - name: Build
        run: cmake --build --preset ci-windows
      - name: Test
        run: ctest --preset ci-windows

  debian-default:
    name: debian-default
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y --no-install-recommends git cmake ninja-build g++ ca-certificates
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux
      - name: Build
        run: cmake --build --preset ci-linux
      - name: Test
        run: ctest --preset ci-linux

  debian-clang:
    name: debian-clang
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y --no-install-recommends git cmake ninja-build clang ca-certificates
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
      - name: Build
        run: cmake --build --preset ci-linux
      - name: Test
        run: ctest --preset ci-linux

  linux-clang-asan-ubsan:
    name: linux-clang-asan-ubsan
    runs-on: ubuntu-24.04
    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake ninja-build clang
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux-asan -DCMAKE_CXX_COMPILER=clang++
      - name: Build
        run: cmake --build --preset ci-linux-asan
      - name: Test
        run: ctest --preset ci-linux-asan
      - name: Example smoke
        run: ./build/ci-linux-asan/examples/msl_example_string_split

  alpine-clang:
    name: alpine-clang (non-blocking)
    runs-on: ubuntu-latest
    container: alpine:3.20
    continue-on-error: true
    steps:
      - name: Install dependencies
        run: apk add --no-cache git cmake ninja clang build-base
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset ci-linux -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
      - name: Build
        run: cmake --build --preset ci-linux
      - name: Test
        run: ctest --preset ci-linux
